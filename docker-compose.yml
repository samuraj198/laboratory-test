services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./src:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8000:80"
    networks:
      - template_network
    depends_on:
      app:
        condition: service_healthy
  app:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "5173:5173"
    networks:
      - template_network
    depends_on:
      - mysql
      - redis
    command: >
      sh -c "
      if [ ! -d vendor ]; then echo 'Установка vendor...'; composer install --no-interaction --ansi; fi &&
      if [ ! -d node_modules ]; then echo 'Установка node_modules...'; npm install; fi &&
      mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache &&
      chown -R www-data:www-data storage bootstrap/cache &&
      chmod -R 775 storage bootstrap/cache &&
      php-fpm -D &&
      npm run dev -- --host
      "
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/vendor/autoload.php"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 5s
      
  mysql:
    image: mysql:8.4
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=laravel
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - template_network
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - template_network

networks:
  template_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
