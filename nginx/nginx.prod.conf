server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/html/public;

    # Отключаем отображение версии Nginx в заголовках (безопасность)
    server_tokens off;

    # Настройка кэширования для скомпилированного фронтенда Vue 3 (папка public/build)
    location /build/ {
        expires max;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # ИСПРАВЛЕНО: PHP-FPM работает локально внутри этого же контейнера
        fastcgi_pass 127.0.0.1:9000;

        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Запрещаем доступ к скрытым файлам (например, .htaccess или .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
